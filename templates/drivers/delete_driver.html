{% extends "base.html" %}

{% block title %}
Delete Driver
{% endblock %}

{% block content %}

<div class="card shadow">

    <div class="card-header bg-danger text-white">

        <h4>
            Delete Driver
        </h4>

    </div>

    <div class="card-body">

        <p class="fs-5">

            Are you sure you want to delete

            <strong>
                {{ driver.user.get_full_name }}
            </strong> ?

        </p>

        <form method="post">

            {% csrf_token %}

            <button
                type="submit"
                class="btn btn-danger"
            >
                Delete Driver
            </button>

            <a
                href="{% url 'manage_drivers' %}"
                class="btn btn-secondary"
            >
                Cancel
            </a>

        </form>

    </div>

</div>

{% endblock %}

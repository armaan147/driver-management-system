{% load static %}

<!DOCTYPE html>
<html>

<head>

    <title>DRI Driver Management System</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <style>

        body{
            background:#f4f6f9;
            min-height:100vh;
        }

        .flag-top{
            height:8px;
            background:
            linear-gradient(
                to bottom,
                #FF9933 33%,
                #FFFFFF 33%,
                #FFFFFF 66%,
                #138808 66%
            );
        }

        .hero{
            min-height:90vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .portal-card{
            background:white;
            border-radius:20px;
            padding:50px;
            box-shadow:0 15px 40px rgba(0,0,0,0.15);
            text-align:center;
            max-width:800px;
            width:100%;
        }

        .portal-card img{
            width:170px;
            margin-bottom:20px;
        }

        .gov-title{
            color:#0f3d6e;
            font-weight:700;
        }

        .sub-title{
            color:#666;
        }

        .btn-admin{
            background:#dc3545;
            color:white;
            padding:15px 35px;
            font-size:20px;
        }

        .btn-driver{
            background:#0d6efd;
            color:white;
            padding:15px 35px;
            font-size:20px;
        }

        .footer-note{
            margin-top:25px;
            color:#666;
        }

    </style>

</head>

<body>

<div class="flag-top"></div>

<div class="hero">

    <div class="portal-card">

        <img
            src="{% static 'images/dri_logo.png' %}"
            alt="DRI Logo">

        <h2 class="gov-title">
            Directorate of Revenue Intelligence
        </h2>

        <h5>
            Government of India
        </h5>

        <p class="sub-title">
            Driver Management System
        </p>

        <hr>

        <div class="mt-4">

            <a
                href="/login/"
                class="btn btn-admin me-3">

                Admin Login

            </a>

            <a
                href="/login/"
                class="btn btn-driver">

                Driver Login

            </a>

        </div>

        <div class="footer-note">

            Authorized Personnel Only

            <br>

            © Directorate of Revenue Intelligence

        </div>

    </div>

</div>

</body>

</html>

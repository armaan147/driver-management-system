{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>
        DRI Driver Management System
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <style>

        body{
            background:#f1f5f9;
            min-height:100vh;
        }

        .login-wrapper{
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .login-card{
            width:100%;
            max-width:520px;
            border:none;
            border-radius:18px;
            overflow:hidden;
            box-shadow:0 15px 40px rgba(0,0,0,0.15);
        }

        .login-header{
            background:#0f3d6e;
            color:white;
            text-align:center;
            padding:30px;
        }

        .login-header img{
            width:110px;
            margin-bottom:15px;
        }

        .login-header h3{
            font-weight:700;
            margin-bottom:5px;
        }

        .login-header p{
            margin:0;
            opacity:.9;
        }

        .login-body{
            padding:35px;
            background:white;
        }

        .btn-dri{
            background:#0f3d6e;
            color:white;
            width:100%;
            padding:12px;
            font-weight:600;
        }

        .btn-dri:hover{
            background:#0b2f56;
            color:white;
        }

        .gov-strip{
            background:#f8c300;
            height:6px;
        }

        .footer-note{
            text-align:center;
            color:#666;
            font-size:14px;
            margin-top:20px;
        }

    </style>

</head>

<body>

<div class="login-wrapper">

    <div class="card login-card">

        <div class="gov-strip"></div>

        <div class="login-header">

            <img
                src="{% static 'images/dri_logo.png' %}"
                alt="DRI Logo">

            <h3>
                Directorate of Revenue Intelligence
            </h3>

            <p>
                Government of India
            </p>

            <p>
                Driver Management System
            </p>

        </div>

        <div class="login-body">

            {% if messages %}

                {% for message in messages %}

                    <div class="alert alert-danger">
                        {{ message }}
                    </div>

                {% endfor %}

            {% endif %}

            <form method="post">

                {% csrf_token %}

                <div class="mb-3">

                    <label class="form-label">
                        Username
                    </label>

                    <input
                        type="text"
                        name="username"
                        class="form-control"
                        required>

                </div>

                <div class="mb-4">

                    <label class="form-label">
                        Password
                    </label>

                    <input
                        type="password"
                        name="password"
                        class="form-control"
                        required>

                </div>

                <button
                    type="submit"
                    class="btn btn-dri">

                    Secure Login

                </button>

            </form>

            <div class="footer-note">

                Authorized Personnel Only

                <br>

                © Directorate of Revenue Intelligence

            </div>

        </div>

    </div>

</div>

</body>
</html>
